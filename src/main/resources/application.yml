server:
  port: 8081

spring:
  config:
    import: optional:file:.env[.properties]
  application:
    name: model-store
  main:
    allow-circular-references: true
  codec:
    max-in-memory-size: 100MB
  r2dbc:
    url: r2dbc:postgresql://localhost:5432/model_store?tcpKeepAlive=true
    username: root
    password: root
    pool:
      enabled: true
      initial-size: 5
      max-size: 40
      max-idle-time: 20m
      max-life-time: 30m
      max-acquire-time: 10s
      validation-query: "SELECT 1"
      validation-depth: remote
  flyway:
    locations: classpath:/db/migration  # Путь к миграциям
    enabled: true
  mail:
    host: ${SPRING_MAIL_HOST:smtp.gmail.com}
    port: ${SPRING_MAIL_PORT:587}
    username: ${SPRING_MAIL_USERNAME:}
    password: ${SPRING_MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
          ssl:
            trust: ${SPRING_MAIL_PROPERTIES_MAIL_SMTP_SSL_TRUST:smtp.gmail.com}
  servlet:
    multipart:
      enabled: true
      max-file-size: 10MB
      max-request-size: 10MB

s3:
  access-key: minio_user               # Ключ доступа к MinIO
  secret-key: minio_password           # Секретный ключ MinIO
  endpoint: http://localhost:9000      # Адрес MinIO (если развернут локально)
  region: us-east-1                    # Регион (для MinIO можно указать любой, но это необходимо для корректной работы
  participant-bucket-name: participant-bucket # Папка фотографий пользователей
  product-bucket-name: product-bucket  # Папка фотографий продуктов
  system-bucket-name: system-bucket  # Папка системный фото
  order-bucket-name: order-bucket  # Папка доказательств (оплаты, споров) пользователей
springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /v3/api-docs

app:
  max-participant-images: 1
  max-product-images: 4
  product-expiration-days: 30
  private-key-path: keys/private_key.pem
  public-key-path: keys/public_key.pem
  email-from: ${APP_EMAIL_FROM:misterstes8@gmail.com}
  email-reply-to: ${APP_EMAIL_REPLY_TO:figurzilla@mail.ru}
  cors-allow-all: false
  allowed-origins:
    - "http://localhost:3000"
    - "http://localhost:5173"
  # Базовый URL CDN (Content Delivery Network) для отдачи изображений напрямую клиенту.
  # Используется в /images/metadata — фронт получает ссылку и загружает картинку без проксирования через бэкенд.
  # Локально: укажи http://localhost:9000 (MinIO), в проде — реальный CDN-домен. (https://cdn.figurzilla.ru)
  cdn-base-url: http://localhost:9000

logging:
  level:
    root: INFO
    com.model_store: DEBUG             # DEBUG для всех наших классов
    org.springframework.web: DEBUG
    org.springframework.web.server: DEBUG
    com.example.filter: INFO
    org.springdoc: WARN
    org.flywaydb.core: WARN
    org.springframework.jdbc.core: WARN
    org.springframework.r2dbc.core: WARN
    org.hibernate.SQL: WARN
