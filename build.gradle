buildscript {
    repositories { mavenCentral() }
    dependencies {
        classpath 'org.postgresql:postgresql:42.7.5'
        classpath 'org.flywaydb:flyway-database-postgresql:10.20.1'
    }
}

plugins {
    id 'java'
    id 'application'
    id 'org.flywaydb.flyway' version '10.21.0'
    id 'org.springframework.boot' version '3.4.5'
    id 'io.spring.dependency-management' version '1.1.7'
}

repositories {
    mavenCentral()
}

group = 'com.model-store'
version = '0.0.1-SNAPSHOT'

java {
    sourceCompatibility = '21'
    targetCompatibility = '21'
}

configurations {
    compileOnly {
        extendsFrom annotationProcessor
    }
}

flyway {
    url = 'jdbc:postgresql://localhost:5432/model_store'
    user = 'root'
    password = 'root'
    locations = ['filesystem:src/main/resources/db/migration']
    baselineVersion = '7.17.7'
    cleanDisabled = false
}

dependencies {

    // Lombok
    annotationProcessor 'org.projectlombok:lombok:1.18.38'

    // Web
    implementation 'org.springframework.boot:spring-boot-starter-webflux:3.4.5'
    implementation 'org.springdoc:springdoc-openapi-starter-webflux-ui:2.8.6'

    // Mail
    implementation 'org.springframework.boot:spring-boot-starter-mail:3.4.5'

    // DB
    implementation 'org.springframework.boot:spring-boot-starter-data-r2dbc:3.4.5'
    implementation 'org.postgresql:r2dbc-postgresql:1.0.7.RELEASE'
    runtimeOnly 'org.postgresql:postgresql:42.7.5'

    // Flyway (10.x требует отдельный модуль для PostgreSQL)
    implementation 'org.flywaydb:flyway-core:10.20.1'
    runtimeOnly 'org.flywaydb:flyway-database-postgresql:10.20.1'


    // JetBrains annotations (был транзитивным через minio/aws-sdk-v2, теперь явный)
    implementation 'org.jetbrains:annotations:26.0.1'

    // S3 (AWS SDK v1 — используется в коде, com.amazonaws импорты)
    implementation 'org.springframework.cloud:spring-cloud-starter-aws:2.2.6.RELEASE'

    // Validation
    implementation 'org.springframework.boot:spring-boot-starter-validation:3.4.5'

    // Security
    implementation 'org.springframework.boot:spring-boot-starter-oauth2-resource-server:3.4.5'
    implementation 'io.jsonwebtoken:jjwt-api:0.12.6'
    runtimeOnly 'io.jsonwebtoken:jjwt-impl:0.12.6'
    runtimeOnly 'io.jsonwebtoken:jjwt-jackson:0.12.6'

    // MapStruct
    implementation 'org.mapstruct:mapstruct:1.6.3'
    annotationProcessor 'org.mapstruct:mapstruct-processor:1.6.3'

    // Logstash JSON encoder — используется в logback-spring.xml
    implementation 'net.logstash.logback:logstash-logback-encoder:8.1'

    // MDC propagation across Reactor thread switches
    implementation 'io.micrometer:context-propagation'

    // AOP
    implementation 'org.springframework.boot:spring-boot-starter-aop:3.4.5'

    // Image resizing
    implementation 'org.imgscalr:imgscalr-lib:4.2'

    // Test
    testImplementation 'org.springframework.boot:spring-boot-starter-test:3.4.5'
    testImplementation 'io.projectreactor:reactor-test:3.7.5'
    testImplementation 'io.zonky.test:embedded-postgres:2.0.7'
}

test {
    useJUnitPlatform()
    jvmArgs '-Dnet.bytebuddy.experimental=true'
}
